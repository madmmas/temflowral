version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - misspell
    - unconvert
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/madmmas/temflowral
