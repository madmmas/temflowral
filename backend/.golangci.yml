version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    # Extra checks beyond golangci-lint's standard set.
    - bodyclose
    - durationcheck
    - errcheck
    - govet
    - misspell
    - nilerr
    - noctx
    - staticcheck
    - unconvert
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx

issues:
  # CI must report the full result rather than silently truncating findings.
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/madmmas/temflowral
