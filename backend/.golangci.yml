linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unused

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/yourusername/temflowral

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck