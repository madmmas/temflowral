# Local development stack. For now this runs only the Temporal dev server
# (Temporal Server + Web UI + CLI in one image); issue #25 extends it with
# Postgres, the backend, and the frontend.
services:
  temporal:
    image: temporalio/temporal:1.8.0
    container_name: temflowral-temporal
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233" # gRPC frontend
      - "8233:8233" # Web UI
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
