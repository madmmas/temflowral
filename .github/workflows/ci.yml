name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── always runs, never fails ────────────────────────────────
  # Detects which parts of the repo have code worth testing.
  # All other jobs read its outputs and skip themselves if needed.
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'go.work'
            frontend:
              - 'frontend/**'

  # ─── go-test ─────────────────────────────────────────────────
  go-test:
    name: go-test
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - name: Skip — no backend changes
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes — skipping go-test"

      - name: Set up Go
        if: needs.changes.outputs.backend == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Check for Go files
        if: needs.changes.outputs.backend == 'true'
        id: gofiles
        working-directory: backend
        run: |
          count=$(find . -name "*.go" | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Found $count Go files"

      - name: Run tests
        if: needs.changes.outputs.backend == 'true' && steps.gofiles.outputs.count > 0
        working-directory: backend
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: needs.changes.outputs.backend == 'true' && steps.gofiles.outputs.count > 0
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: backend/coverage.out

  # ─── go-lint ─────────────────────────────────────────────────
  go-lint:
    name: go-lint
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - name: Skip — no backend changes
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes — skipping go-lint"

      - name: Set up Go
        if: needs.changes.outputs.backend == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Check for Go files
        if: needs.changes.outputs.backend == 'true'
        id: gofiles
        working-directory: backend
        run: |
          count=$(find . -name "*.go" | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Run golangci-lint
        if: needs.changes.outputs.backend == 'true' && steps.gofiles.outputs.count > 0
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: backend
          version: v2.12.2

  # ─── frontend-test ───────────────────────────────────────────
  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4

      - name: Skip — no frontend changes
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No frontend changes — skipping frontend-test"

      - name: Set up Node
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Check for package.json
        if: needs.changes.outputs.frontend == 'true'
        id: pkgjson
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true' && steps.pkgjson.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        if: needs.changes.outputs.frontend == 'true' && steps.pkgjson.outputs.exists == 'true'
        working-directory: frontend
        run: npm test -- --reporter=verbose

  # ─── e2e ─────────────────────────────────────────────────────
  # Disabled until Day 13. Uncomment then.
  # e2e:
  #   name: e2e
  #   runs-on: ubuntu-latest
  #   needs: [go-test, frontend-test]
  #   steps: ...